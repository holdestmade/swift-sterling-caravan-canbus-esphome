                use_extended_id: false
                data: !lambda |-
                  const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
                  const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
                  return std::vector<uint8_t>{10, 150, d1_cur, d2_cur, 4, 0, 0, 0};

      - lambda: |-
          id(g_dim2_sync) = false;
    on_turn_off:
      - lambda: |-
          id(g_dim2_sync) = true;
      - if:
          condition:
            lambda: |-
              return id(g_d2_on);
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
                  const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
                  return std::vector<uint8_t>{10, 150, d1_cur, d2_cur, 4, 0, 0, 0};
      - lambda: |-
          id(g_dim2_sync) = false;

  - platform: binary
    name: "Interior Lights"
