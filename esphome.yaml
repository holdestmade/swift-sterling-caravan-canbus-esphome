  - platform: template
    id: internal_humidity
    name: "Internal Humidity"
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never
    filters:
      - throttle: 10s
      - delta: 0.5

  - platform: template
    id: canbus_rate
    name: "Canbus Rate"
    unit_of_measurement: "msg/s"
    accuracy_decimals: 0
    update_interval: 1s
    entity_category: diagnostic
    lambda: |-
      static uint32_t last_count = 0;
      uint32_t current = id(g_can_frame_counter);
      uint32_t diff = current - last_count;
      last_count = current;
      return diff;
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

output:
  - platform: template
    id: dimmer1_tx_out
    type: float
    write_action:
      - if:
          condition:
            lambda: |-
              if (id(g_dim1_sync)) return false;
              const uint8_t d1_new = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, state * 100.0f)));
              const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
              return d1_new != d1_cur;
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t d1 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, state * 100.0f)));
                  const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
                  return std::vector<uint8_t>{1, 150, d1, d2_cur, 4, 0, 0, 0};

  - platform: template
    id: dimmer2_tx_out
    type: float
    write_action:
      - if:
          condition:
            lambda: |-
              if (id(g_dim2_sync)) return false;
              const uint8_t d2_new = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, state * 100.0f)));
              const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
              return d2_new != d2_cur;
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t d2 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, state * 100.0f)));
                  const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
                  return std::vector<uint8_t>{1, 150, d1_cur, d2, 4, 0, 0, 0};

  - platform: template
    id: interior_lights_tx_out
    type: binary
    write_action:
      - if:
          condition:
            lambda: |-
              const bool syncing = id(g_interior_sync); 
              const bool want_on = state;
              const bool is_on   = id(g_032_b2) > 0;
              return (!syncing) && (want_on != is_on);
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
                  const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
                  return std::vector<uint8_t>{5, 150, d1_cur, d2_cur, 4, 0, 0, 0};

  - platform: template
    id: awning_light_tx_out
    type: binary
    write_action:
      - if:
          condition:
            lambda: |-
              const bool syncing = id(g_awning_sync);
              const bool want_on = state;
              const bool is_on   = id(g_032_b3) > 0;
              return (!syncing) && (want_on != is_on);
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
                  const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
                  return std::vector<uint8_t>{6, 150, d1_cur, d2_cur, 4, 0, 0, 0};

  - platform: template
    id: entry_light_tx_out
    type: binary
    write_action:
      - if:
          condition:
            lambda: |-
              const bool syncing = id(g_entry_sync);
              const bool want_on = state;
              const bool is_on   = id(g_entry_on);
              return (!syncing) && (want_on != is_on);
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
                  const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
                  return std::vector<uint8_t>{8, 150, d1_cur, d2_cur, 4, 0, 0, 0};

  - platform: ledc
    pin: 16
    inverted: false
    max_power: 0.5
    id: floor_lights_output
    frequency: 10000 Hz

  - platform: ledc
    pin: 17
    inverted: false
    max_power: 0.5
    id: pelmet_lights_output
    frequency: 10000 Hz

