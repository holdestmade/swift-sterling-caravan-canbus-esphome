esphome:
  name: caravan-canbus-to-wifi
  friendly_name: Caravan Canbus to WIFI
  comment: ESP32 and SN65HVD230 CAN Interface
  includes:
    - canbus_helpers.h
esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_PHY_REDUCE_TX_POWER: "y"
    advanced:
      minimum_chip_revision: '3.1'
      sram1_as_iram: true

wifi:
  networks:
    - ssid: !secret wifi_ssid2
      password: !secret wifi_password2
  ap:
    ssid: ESPHome AP
    password: !secret wifi_password2

captive_portal:

api:
  # Don't reboot when Home Assistant is unreachable — the caravan is often
  # away from the home network and the ESP must keep running the bus.
  reboot_timeout: 0s
  encryption:
    key: !secret esphome_key

ota:
  - platform: esphome

button:
  - platform: restart
    name: Restart

logger:
  level: WARN

interval:
  - interval: 1s
    then:
      - lambda: |-
          const bool online = id(g_can_last_ms) != 0 && (millis() - id(g_can_last_ms)) < 5000;
          if (!id(bs_can_online).has_state() || id(bs_can_online).state != online) {
            id(bs_can_online).publish_state(online);
          }

          // Interior master watchdog: only force the HA entity back on while
          // the bus agrees the master is on (0x032 byte 2), so it doesn't
          // fight the 0x032 off-sync when the panel turns it off. Checked
          // here once a second rather than in the every-frame handler.
          if (online && id(g_032_b2) > 0 && !id(interior_lights).current_values.is_on()) {
            id(g_interior_sync) = true;
            auto call = id(interior_lights).turn_on();
            call.set_transition_length(0);
            call.perform();
            id(g_interior_sync) = false;
          }

  # Status / CAN activity LED driver. Priority order:
  #  1. ESPHome warning/error (WiFi or API down, OTA, ...): the status_led
  #     light platform overrides the LED with its blink patterns automatically.
  #  2. CAN traffic: ~5 Hz flicker — the LED toggles on every 100 ms tick in
  #     which at least one frame arrived, so it visibly tracks bus activity.
  #  3. CAN silent for 5 s (same rule as bs_can_online): solid on, meaning
  #     "running fine, but no CAN data".
  - interval: 100ms
    then:
      - lambda: |-
          static uint32_t last_count = 0;
          const uint32_t count = id(g_can_frame_counter);
          const bool traffic = count != last_count;
          last_count = count;

          if (traffic) {
            id(status_can_led).toggle().perform();
            return;
          }

          const bool online = id(g_can_last_ms) != 0 && (millis() - id(g_can_last_ms)) < 5000;
          if (!online && !id(status_can_led).current_values.is_on()) {
            id(status_can_led).turn_on().perform();
          }

globals:
  - id: g_d1_on
    type: bool
    restore_value: no
    initial_value: "false"

  - id: g_d2_on
    type: bool
    restore_value: no
    initial_value: "false"

  - id: g_d1_level
    type: float
    restore_value: no
    initial_value: "0.0"

  - id: g_d2_level
    type: float
    restore_value: no
    initial_value: "0.0"

  # 0x032 bytes mirrored for TX conditions (interior / awning light state).
  - id: g_032_b2
    type: uint8_t
    restore_value: no
    initial_value: '0'
  - id: g_032_b3
    type: uint8_t
    restore_value: no
    initial_value: '0'

  # TX gating: command frames embed cached state (dimmer levels, set temp,
  # hot-water mode, heating level), so don't transmit until the frames that
  # populate that cache have been received at least once since boot.
  - id: g_033_synced
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_05b_synced
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_085_synced
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: g_entry_sync
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: g_entry_on
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: g_interior_sync
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: g_awning_sync
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: g_dim1_sync
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: g_dim2_sync
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: g_can_last_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # 0..3 (Off / 1kW / 2kW / 3kW). No longer includes Gas — that's now sw_gas.
  - id: g_heat_mode_idx
    type: uint8_t
    restore_value: no
    initial_value: '0'

  - id: g_hot_water_mode_idx
    type: uint8_t
    restore_value: no
    initial_value: '0'

  - id: g_can_frame_counter
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: g_atc_last_sig
    type: uint64_t
    restore_value: no
    initial_value: '0'

  # --- 0x00B shared-frame state (bytes 5..7) ---
  # byte 5: heating set temperature (°C). Synced from 0x05B byte 4.
  - id: g_00b_b5
    type: uint8_t
    restore_value: no
    initial_value: '20'

  # byte 7: heating override duration (hours). No known read source,
  # so we restore the last value we sent across reboots.
  - id: g_00b_b7
    type: uint8_t
    restore_value: yes
    initial_value: '1'

  # 0=Override (byte 0 = 110), 1=Timer (byte 0 = 108). Synced from 0x087 byte 6.
  - id: g_heat_control_mode_idx
    type: uint8_t
    restore_value: no
    initial_value: '0'

  # Gas status (0xAD byte 1). Synced from 0x085 byte 1.
  - id: g_gas_on
    type: bool
    restore_value: no
    initial_value: 'false'

canbus:
  - platform: esp32_can
    id: caravan_can
    rx_pin: GPIO4
    tx_pin:
      number: GPIO5
      ignore_strapping_warning: true
    bit_rate: 125kbps
    can_id: 0x000
    use_extended_id: false

    on_frame:
      - can_id: 0x000
        can_id_mask: 0x000
        then:
          - lambda: |-
              id(g_can_last_ms) = millis();
              id(g_can_frame_counter)++;

      # Alko ATC CAN Block
      - can_id: 0x0D8
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.size() < 8) return;
              uint64_t frame = 0;
              for (int i = 0; i < 8; i++) frame |= ((uint64_t)x[i]) << (i * 8);

              if (frame != id(g_atc_last_sig)) {
                id(g_atc_last_sig) = frame;
                std::string hex = format_hex_pretty(x.data(), x.size());
                id(ts_alko_atc_last_data).publish_state(hex);
              }

              const uint64_t status_not_known       = 0x0000000000000000ULL;
              const uint64_t waiting_for_self_test  = 0x0000000000008406ULL;
              const uint64_t self_test_active_1     = 0x0000000000007606ULL;
              const uint64_t self_test_active_2     = 0x0000000000008006ULL;
              const uint64_t self_test_active_3     = 0x0000000000008301ULL;
              const uint64_t active                 = 0x0000000000008401ULL;
              const uint64_t in_action              = 0x0000000000009999ULL;

              const char *state = "Unknown";
              if (frame == status_not_known) state = "Status not Known";
              else if (frame == waiting_for_self_test) state = "Waiting for Self Test";
              else if (frame == self_test_active_1 || frame == self_test_active_2 || frame == self_test_active_3) state = "Self Test Active";
              else if (frame == active) state = "Active";
              else if (frame == in_action) state = "In Action";

              if (!id(ts_alko_atc_status).has_state() || id(ts_alko_atc_status).state != state) {
                id(ts_alko_atc_status).publish_state(state);
                ESP_LOGD("ATC", "Alko ATC: %s", state);
              }

      - can_id: 0x032
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.size() < 8) {
                ESP_LOGD("CAN032", "short frame (%u)", (unsigned)x.size());
                return;
              }

              id(g_032_b2) = x[2];
              id(g_032_b3) = x[3];

              caravan::pub_bin(id(bs_pump),       x[0] > 0);
              caravan::pub_txt(id(ts_selected_battery), x[1] ? "Car" : "Leisure");
              caravan::pub_bin(id(bs_car_engine), x[5] > 0);
              caravan::pub_bin(id(bs_mains),      x[6] > 0);
              caravan::pub_bin(id(bs_power),      x[7] > 0);

              static bool last_interior = false;
              const bool interior_on = x[2] > 0;
              if (interior_on != last_interior) {
                last_interior = interior_on;
                id(g_interior_sync) = true;
                auto call = interior_on ? id(interior_lights).turn_on() : id(interior_lights).turn_off();
                call.set_transition_length(0);
                call.perform();
                id(g_interior_sync) = false;
              }

              static bool last_awn = false;
              const bool awn_on = x[3] > 0;
              if (awn_on != last_awn) {
                last_awn = awn_on;
                id(g_awning_sync) = true;
                auto call = awn_on
                  ? id(awning_light).turn_on()
                  : id(awning_light).turn_off();
                call.set_transition_length(0);
                call.perform();
                id(g_awning_sync) = false;
              }

      - can_id: 0x033
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.size() >= 8) {
                const bool d1_on  = x[0] > 0;
                const bool d2_on  = x[1] > 0;
                const float d1_lv = x[2] / 100.0f;
                const float d2_lv = x[3] / 100.0f;

                id(g_d1_on) = d1_on; id(g_d1_level) = d1_lv;
                id(g_d2_on) = d2_on; id(g_d2_level) = d2_lv;
                id(g_033_synced) = true;

                static bool last_d1 = false;
                if (d1_on != last_d1) {
                  last_d1 = d1_on;
                  id(g_dim1_sync) = true;
                  auto c1 = d1_on ? id(dimmer1_light).turn_on() : id(dimmer1_light).turn_off();
                  c1.set_transition_length(0);
                  c1.perform();
                  id(g_dim1_sync) = false;
                }

                static bool last_d2 = false;
                if (d2_on != last_d2) {
                  last_d2 = d2_on;
                  id(g_dim2_sync) = true;
                  auto c2 = d2_on ? id(dimmer2_light).turn_on() : id(dimmer2_light).turn_off();
                  c2.set_transition_length(0);
                  c2.perform();
                  id(g_dim2_sync) = false;
                }

                // Panel-side brightness changes: mirror the bus level into the
                // HA lights so the sliders track dimming done at the control
                // panel. g_d?_level is already updated above, so the output
                // write_action sees pct(state) == pct(level) and won't echo
                // the frame back onto the bus.
                if (d1_on && id(dimmer1_light).current_values.is_on() &&
                    caravan::pct(id(dimmer1_light).current_values.get_brightness()) != caravan::pct(d1_lv)) {
                  id(g_dim1_sync) = true;
                  auto cb1 = id(dimmer1_light).turn_on();
                  cb1.set_brightness(d1_lv);
                  cb1.set_transition_length(0);
                  cb1.perform();
                  id(g_dim1_sync) = false;
                }
                if (d2_on && id(dimmer2_light).current_values.is_on() &&
                    caravan::pct(id(dimmer2_light).current_values.get_brightness()) != caravan::pct(d2_lv)) {
                  id(g_dim2_sync) = true;
                  auto cb2 = id(dimmer2_light).turn_on();
                  cb2.set_brightness(d2_lv);
                  cb2.set_transition_length(0);
                  cb2.perform();
                  id(g_dim2_sync) = false;
                }

                caravan::pub_txt(id(ts_solar_charging_source), x[6] ? "Car" : "Leisure");
                caravan::pub_bin(id(bs_solar_charging), x[7] > 0);
              } else {
                ESP_LOGD("CAN033", "short frame (%u)", (unsigned)x.size());
              }

      - can_id: 0x04E
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.empty()) return;
              if (x[0] == 240 && x.size() >= 8) {
                caravan::pub_num(id(solar_charging_current), x[3] / 100.0f, 0.01f);
                caravan::pub_num(id(solar_charging_mode), (float)x[5], 0.5f);
              } else if (x[0] == 241 && x.size() >= 6) {
                caravan::pub_num(id(solar_panel_voltage),          x[1] / 10.0f, 0.05f);
                caravan::pub_num(id(solar_mppt_charging_mode),     (float)x[2], 0.5f);
                caravan::pub_num(id(solar_charger_output_voltage), x[3] / 10.0f, 0.05f);
              } else {
                ESP_LOGD("CAN04E", "unexpected frame b0=%u size=%u", (unsigned)x[0], (unsigned)x.size());
              }

      - can_id: 0x05A
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.size() >= 8) {
                caravan::pub_bin(id(bs_frost_warning),            x[0] > 0);
                caravan::pub_bin(id(bs_vehicle_voltage_warning),  x[1] > 0);
                caravan::pub_bin(id(bs_leisure_voltage_warning),  x[2] > 0);
                caravan::pub_bin(id(bs_mains_warning),            x[6] > 0);
                caravan::pub_bin(id(bs_ac_overcurrent_warning),   x[7] > 0);
              } else {
                ESP_LOGD("CAN05A", "short frame (%u)", (unsigned)x.size());
              }

      - can_id: 0x05B
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.size() >= 8) {
                id(g_05b_synced) = true;
                caravan::pub_txt(id(ts_cp_software_version),   to_string((int)x[0]));
                caravan::pub_txt(id(ts_ec630_software_version), to_string((int)x[1]));
                {
                  const float temp = (float)x[4];
                  if (!id(num_heating_set_temperature).has_state() ||
                      (int)id(num_heating_set_temperature).state != (int)temp) {
                    id(num_heating_set_temperature).publish_state(temp);
                  }
                  // Keep the 0x00B byte-5 mirror current so light commands don't stomp it.
                  id(g_00b_b5) = (uint8_t) x[4];
                }

                {
                  const uint8_t hw = x[5];
                  if (id(g_hot_water_mode_idx) != hw && hw <= 2) {
                    id(g_hot_water_mode_idx) = hw;
                    static const char* opts[] = {"Off","Normal","Boost"};
                    id(sel_hot_water_mode).publish_state(opts[hw]);
                  }
                }
                caravan::pub_bin(id(bs_heating_error),   x[6] > 0);
                caravan::pub_bin(id(bs_hot_water_error), x[7] > 0);
              } else {
                ESP_LOGD("CAN05B", "short frame (%u)", (unsigned)x.size());
              }

      - can_id: 0x083
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.size() >= 6) {
                uint16_t raw_ext = (uint16_t(x[3]) << 8) | x[2];
                uint16_t raw_int = (uint16_t(x[5]) << 8) | x[4];

                const float K_OFFSET = 273.15f;
                const float t_ext = (raw_ext / 10.0f) - K_OFFSET;
                const float t_int = (raw_int / 10.0f) - K_OFFSET;

                ESP_LOGD("CAN083",
                         "RAW83: [%u] %s -> raw_ext=%u raw_int=%u t_ext=%.2f t_int=%.2f",
                         (unsigned)x.size(),
                         format_hex_pretty(x.data(), x.size()).c_str(),
                         raw_ext, raw_int, t_ext, t_int);

                // Raw 0 (probe absent / not ready) would decode to -273.15 °C;
                // skip it rather than pollute HA history with absolute zero.
                if (raw_ext != 0)
                  caravan::pub_num(id(temp_external), roundf(t_ext * 10.0f) / 10.0f, 0.1f);
                if (raw_int != 0)
                  caravan::pub_num(id(temp_internal), roundf(t_int * 10.0f) / 10.0f, 0.1f);
              }

              if (x.size() >= 7) {
                caravan::pub_txt(id(ts_psu_software_number), to_string((int)x[6]));
              }

      - can_id: 0x084
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.size() >= 8) {
                caravan::pub_num(id(vehicle_batt_voltage), x[0] / 10.0f, 0.05f);
                caravan::pub_num(id(leisure_batt_voltage), x[1] / 10.0f, 0.05f);

                const float raw_current = x[2] / 10.0f;
                const float sign = x[3] ? 1.0f : -1.0f;
                caravan::pub_num(id(leisure_batt_current), raw_current * sign, 0.05f);
                caravan::pub_txt(id(ts_leisure_batt_status), x[3] ? "Charge" : "Discharge");

                caravan::pub_num(id(solar_current), x[4] / 10.0f, 0.05f);
                caravan::pub_num(id(ac_current),    x[5] / 10.0f, 0.05f);

                caravan::pub_num(id(internal_humidity), (float)x[6], 0.5f);

                const bool entry_on = x[7] > 0;
                if (id(g_entry_on) != entry_on) {
                  id(g_entry_on) = entry_on;
                  id(g_entry_sync) = true;
                  auto c = entry_on ? id(entry_light).turn_on() : id(entry_light).turn_off();
                  c.set_transition_length(0);
                  c.perform();
                  id(g_entry_sync) = false;
                }
              } else {
                ESP_LOGD("CAN084", "short frame (%u)", (unsigned)x.size());
              }

      # 0x085 — heating electric level and gas state.
      # Electric level (byte 0: 0..3) and gas (byte 1: 0/1) are now tracked
      # independently so the user can run gas + electric together.
      - can_id: 0x085
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.size() >= 2) {
                id(g_085_synced) = true;
                uint8_t elec = x[0];
                if (elec > 3) elec = 0;
                if (id(g_heat_mode_idx) != elec) {
                  id(g_heat_mode_idx) = elec;
                  static const char* opts[] = {"Off","Electric 1kW","Electric 2kW","Electric 3kW"};
                  id(sel_heating_mode).publish_state(opts[elec]);
                }

                const bool gas_on = x[1] > 0;
                if (id(g_gas_on) != gas_on) {
                  id(g_gas_on) = gas_on;
                  id(sw_gas).publish_state(gas_on);
                }
              } else {
                ESP_LOGD("CAN085", "short frame (%u)", (unsigned)x.size());
              }

      - can_id: 0x086
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.size() < 8) return;
              const uint8_t to_sel = x[4];
              const char* to_text = "Unknown";
              switch (to_sel) {
                case 0x00: to_text = "Off"; break;
                case 0x01: to_text = "Leisure"; break;
                case 0x02: to_text = "Vehicle"; break;
                default:   to_text = "Unknown"; break;
              }
              caravan::pub_txt(id(ts_solar_charge_to), to_text);
              const uint8_t mode_sel = x[5];
              const char* mode_text = "Unknown";
              switch (mode_sel) {
                case 0x00: mode_text = "Smart"; break;
                case 0x01: mode_text = "Normal"; break;
                case 0x02: mode_text = "Smart 2"; break;
                case 0x03: mode_text = "Smart 3"; break;
                default:   mode_text = "Unknown"; break;
              }
              caravan::pub_txt(id(ts_charging_mode), mode_text);

      # 0x087 — heating control mode (Override/Timer).
      # Byte 6 == 0 → Override (command byte 110), byte 6 != 0 → Timer (command byte 108).
      - can_id: 0x087
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (x.size() >= 7) {
                const bool timer = x[6] > 0;
                const uint8_t idx = timer ? 1 : 0;
                if (id(g_heat_control_mode_idx) != idx) {
                  id(g_heat_control_mode_idx) = idx;
                  static const char* opts[] = {"Override","Timer"};
                  id(sel_heating_control_mode).publish_state(opts[idx]);
                }
              } else {
                ESP_LOGD("CAN087", "short frame (%u)", (unsigned)x.size());
              }

binary_sensor:
  - platform: status
    name: ESP Status

  - platform: template
    id: bs_pump
    name: "Pump"
    icon: mdi:water-pump

  - platform: template
    id: bs_power
    name: "Power"
    icon: mdi:power
    device_class: power

  - platform: template
    id: bs_car_engine
    name: "Car Engine"
    icon: mdi:engine
    device_class: running

  - platform: template
    id: bs_mains
    name: "Mains Connected"
    device_class: plug
    icon: mdi:power-socket-uk

  - platform: template
    id: bs_solar_charging
    name: "Solar Charging"
    device_class: battery_charging

  - platform: template
    id: bs_frost_warning
    name: "Frost Warning"
    icon: mdi:snowflake-alert
    device_class: cold
    entity_category: diagnostic

  - platform: template
    id: bs_vehicle_voltage_warning
    name: "Vehicle Voltage Warning"
    icon: mdi:car-battery
    entity_category: diagnostic

  - platform: template
    id: bs_leisure_voltage_warning
    name: "Leisure Voltage Warning"
    icon: mdi:car-battery
    entity_category: diagnostic

  - platform: template
    id: bs_mains_warning
    name: "Mains Warning"
    icon: mdi:power-socket-uk
    entity_category: diagnostic

  - platform: template
    id: bs_ac_overcurrent_warning
    name: "Mains Over Current Warning"
    icon: mdi:current-ac
    entity_category: diagnostic

  - platform: template
    id: bs_heating_error
    name: "Heating Error"
    icon: mdi:heating-coil
    entity_category: diagnostic

  - platform: template
    id: bs_hot_water_error
    name: "Hot Water Error"
    icon: mdi:water-boiler
    entity_category: diagnostic

  - platform: template
    id: bs_can_online
    name: "CAN Online"
    device_class: connectivity
    icon: mdi:car-connected
    entity_category: diagnostic

  - platform: template
    id: bs_heating_on
    name: "Heating"
    icon: mdi:radiator
    lambda: |-
      // No update until the heating state has synced from CAN (0x085).
      // Gate on g_085_synced, not sel_heating_mode.has_state(): the
      // select's polled lambda publishes its default before sync.
      if (!id(g_085_synced)) return {};
      // Electric level selected OR gas lit.
      return id(g_heat_mode_idx) != 0 || id(g_gas_on);

  - platform: template
    id: bs_hot_water_on
    name: "Hot Water"
    icon: mdi:water-boiler
    lambda: |-
      if (!id(g_05b_synced)) return {};
      return id(g_hot_water_mode_idx) != 0;

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP
    ssid:
      name: SSID
    mac_address:
      name: MAC

  - platform: template
