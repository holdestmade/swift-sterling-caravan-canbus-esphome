              const bool is_on = id(g_032_b2) > 0;
              return state != is_on;
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  return caravan::make_00b(5, id(g_d1_level), id(g_d2_level),
