light:
  # Onboard LED (GPIO2 on most ESP32 devkits). While ESPHome has a warning or
  # error the platform blinks its status patterns; otherwise the 100 ms
  # interval above drives it as a CAN data indicator (flicker = traffic,
  # solid = no CAN). internal: the interval owns the LED, so exposing it to
  # HA would just let a user toggle be overwritten within 100 ms.
  - platform: status_led
    id: status_can_led
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      number: GPIO2
      ignore_strapping_warning: true

  - platform: monochromatic
    gamma_correct: 1.0
    id: dimmer1_light
    name: "Bedroom Light"
    icon: mdi:wall-sconce-flat-variant-outline
    output: dimmer1_tx_out
    restore_mode: RESTORE_DEFAULT_OFF
    # The panel does its own ramping; a local fade would stream a CAN frame
    # per brightness step through the output's write_action.
    default_transition_length: 0s
    on_turn_on:
      - lambda: |-
          id(g_dim1_sync) = true;
      - if:
          condition:
            lambda: |-
              return !id(g_d1_on) && id(g_033_synced) && id(g_05b_synced);
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  return caravan::make_00b(9, id(g_d1_level), id(g_d2_level),
                    id(g_00b_b5), id(g_hot_water_mode_idx), id(g_00b_b7));
      - lambda: |-
          id(g_dim1_sync) = false;
    on_turn_off:
      - lambda: |-
          id(g_dim1_sync) = true;
      - if:
          condition:
            lambda: |-
              return id(g_d1_on) && id(g_033_synced) && id(g_05b_synced);
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  return caravan::make_00b(9, id(g_d1_level), id(g_d2_level),
                    id(g_00b_b5), id(g_hot_water_mode_idx), id(g_00b_b7));
      - lambda: |-
