number:
  # Writable heating set-temperature. Reads g_00b_b5 (kept in sync from 0x05B).
  # When the user sets it we send a 0x00B frame with byte 0 = current mode
  # (108 Timer / 110 Override) and preserve bytes 2..4, 6, 7.
  - platform: template
    id: num_heating_set_temperature
    name: "Heating Target Temperature"
    icon: mdi:thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    min_value: 4
    max_value: 30
    step: 1
    update_interval: 10s
    lambda: |-
      return (float) id(g_00b_b5);
    set_action:
      - canbus.send:
          can_id: 0x00B
          use_extended_id: false
          data: !lambda |-
            const uint8_t temp = (uint8_t) roundf(fmaxf(4.0f, fminf(30.0f, x)));
            const uint8_t mode_byte = (id(g_heat_control_mode_idx) == 1) ? 108 : 110;
            const uint8_t d1 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
            const uint8_t d2 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
            return std::vector<uint8_t>{
              mode_byte, 150, d1, d2, 4,
              temp,
              (uint8_t) id(g_hot_water_mode_idx),
              id(g_00b_b7)
            };
      - lambda: |-
          const float clamped = fmaxf(4.0f, fminf(30.0f, x));
          const uint8_t temp = (uint8_t) roundf(clamped);
          id(g_00b_b5) = temp;
          // Mirror immediately so the UI doesn't wait ~30s for the next 0x05B.
          id(num_heating_set_temperature).publish_state((float)temp);
          id(heating_set_temperature).publish_state((float)temp);
          // Keep the climate entity's target in sync so the interval-based
          // sync doesn't immediately re-fire.
          auto call = id(caravan_climate).make_call();
          call.set_target_temperature((float)temp);
          call.perform();

output:
  - platform: template
    id: dimmer1_tx_out
    type: float
    write_action:
      - if:
          condition:
            lambda: |-
              if (id(g_dim1_sync)) return false;
              const uint8_t d1_new = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, state * 100.0f)));
              const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
              return d1_new != d1_cur;
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t d1 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, state * 100.0f)));
                  const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
                  return std::vector<uint8_t>{1, 150, d1, d2_cur, 4,
                    id(g_00b_b5), (uint8_t) id(g_hot_water_mode_idx), id(g_00b_b7)};

  - platform: template
    id: dimmer2_tx_out
    type: float
    write_action:
      - if:
          condition:
            lambda: |-
              if (id(g_dim2_sync)) return false;
              const uint8_t d2_new = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, state * 100.0f)));
              const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
              return d2_new != d2_cur;
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t d2 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, state * 100.0f)));
                  const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
                  return std::vector<uint8_t>{1, 150, d1_cur, d2, 4,
                    id(g_00b_b5), (uint8_t) id(g_hot_water_mode_idx), id(g_00b_b7)};

  - platform: template
    id: interior_lights_tx_out
    type: binary
    write_action:
      - if:
          condition:
            lambda: |-
              const bool syncing = id(g_interior_sync);
              const bool want_on = state;
              const bool is_on   = id(g_032_b2) > 0;
              return (!syncing) && (want_on != is_on);
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
                  const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
                  return std::vector<uint8_t>{5, 150, d1_cur, d2_cur, 4,
                    id(g_00b_b5), (uint8_t) id(g_hot_water_mode_idx), id(g_00b_b7)};

  - platform: template
    id: awning_light_tx_out
    type: binary
    write_action:
      - if:
          condition:
            lambda: |-
              const bool syncing = id(g_awning_sync);
              const bool want_on = state;
              const bool is_on   = id(g_032_b3) > 0;
              return (!syncing) && (want_on != is_on);
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t d1_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
                  const uint8_t d2_cur = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
