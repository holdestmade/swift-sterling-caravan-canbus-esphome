select:
  - platform: template
    id: sel_heating_mode
    name: "Heating Mode"
    icon: mdi:radiator
    options:
      - "Off"
      - "Electric 1kW"
      - "Electric 2kW"
      - "Electric 3kW"
      - "Gas"
    lambda: |-
      static const char* opts[] = {"Off","Electric 1kW","Electric 2kW","Electric 3kW","Gas"};
      return std::string(opts[id(g_heat_mode_idx)]);
    set_action:
      - lambda: |-
          static const char* opts[] = {"Off","Electric 1kW","Electric 2kW","Electric 3kW","Gas"};
          ESP_LOGI("HEAT", "Heating Mode is read-only; ignoring user change to: %s", x.c_str());
          id(sel_heating_mode).publish_state(opts[id(g_heat_mode_idx)]);

  - platform: template
    id: sel_hot_water_mode
    name: "Hot Water Mode"
    icon: mdi:water-boiler
    options:
      - "Off"
      - "Normal"
      - "Boost"
    lambda: |-
      static const char* opts[] = {"Off","Normal","Boost"};
      return std::string(opts[id(g_hot_water_mode_idx)]);
    set_action:
      - lambda: |-
          static const char* opts[] = {"Off","Normal","Boost"};
          ESP_LOGI("HW", "Hot Water Mode is read-only; ignoring user change to: %s", x.c_str());
          id(sel_hot_water_mode).publish_state(opts[id(g_hot_water_mode_idx)]);

climate:
  - platform: thermostat
    id: caravan_climate
    name: "Alde Heating"
    sensor: temp_internal
    min_idle_time: 1s
    min_heating_off_time: 1s
    min_heating_run_time: 1s
    idle_action:
      - logger.log: "Climate idle (read-only)"
    heat_action:
      - logger.log: "Climate heat (read-only)"
    preset:
      - name: "Default"
        default_target_temperature_low: 19 °C
      - name: "Storage"
        default_target_temperature_low: 10 °C
    default_preset: "Default"
    visual:
      min_temperature: 4 °C
      max_temperature: 30 °C
      temperature_step:
        target_temperature: 1.0
        current_temperature: 0.1
