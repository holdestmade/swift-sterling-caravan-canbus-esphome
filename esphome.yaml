number:
  # Writable heating set-temperature. Reads g_00b_b5 (kept in sync from 0x05B).
  # When the user sets it we send a 0x00B frame with byte 0 = current mode
  # (108 Timer / 110 Override) and preserve bytes 2..4, 6, 7.
  - platform: template
    id: num_heating_set_temperature
    name: "Heating Target Temperature"
    icon: mdi:thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    min_value: 4
    max_value: 30
    step: 1
    # State is pushed from the 0x05B handler and the mirror lambdas below;
    # no need to poll.
    update_interval: never
    lambda: |-
      return (float) id(g_00b_b5);
    set_action:
      - if:
          condition:
            lambda: 'return id(g_033_synced) && id(g_05b_synced);'
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  const uint8_t temp = (uint8_t) roundf(fmaxf(4.0f, fminf(30.0f, x)));
                  const uint8_t mode_byte = caravan::control_mode_byte(id(g_heat_control_mode_idx));
                  return caravan::make_00b(mode_byte, id(g_d1_level), id(g_d2_level),
                    temp, id(g_hot_water_mode_idx), id(g_00b_b7));
            - lambda: |-
                const float clamped = fmaxf(4.0f, fminf(30.0f, x));
                const uint8_t temp = (uint8_t) roundf(clamped);
                id(g_00b_b5) = temp;
                // Mirror immediately so the UI doesn't wait ~30s for the next 0x05B.
                id(num_heating_set_temperature).publish_state((float)temp);

output:
  - platform: template
    id: dimmer1_tx_out
    type: float
    write_action:
      - if:
          condition:
            lambda: |-
              if (id(g_dim1_sync)) return false;
              if (!id(g_033_synced) || !id(g_05b_synced)) return false;
              return caravan::pct(state) != caravan::pct(id(g_d1_level));
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  return caravan::make_00b(1, state, id(g_d2_level),
                    id(g_00b_b5), id(g_hot_water_mode_idx), id(g_00b_b7));

  - platform: template
    id: dimmer2_tx_out
    type: float
    write_action:
      - if:
          condition:
            lambda: |-
              if (id(g_dim2_sync)) return false;
              if (!id(g_033_synced) || !id(g_05b_synced)) return false;
              return caravan::pct(state) != caravan::pct(id(g_d2_level));
          then:
            - canbus.send:
                can_id: 0x00B
                use_extended_id: false
                data: !lambda |-
                  return caravan::make_00b(1, id(g_d1_level), state,
                    id(g_00b_b5), id(g_hot_water_mode_idx), id(g_00b_b7));

  - platform: template
