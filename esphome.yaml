  - platform: template
    id: heating_set_temperature
    name: "Heating Set Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    filters:
      - throttle: 1s
      - delta: 0.1
    on_value:
      then:
        - climate.control:
            id: caravan_climate
            target_temperature: !lambda |-
              return x;

  - platform: template
    id: leisure_battery_power
    name: "Leisure Battery Power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      const float v = id(leisure_batt_voltage).state;
      const float i = id(leisure_batt_current).state;
      if (isnan(v) || isnan(i)) return NAN;
      return roundf(v * i);

  - platform: template
    id: solar_power
    name: "Solar Power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      const float v = id(leisure_batt_voltage).state;
      const float i = id(solar_current).state;
      if (isnan(v) || isnan(i)) return NAN;
      return roundf(v * i);

  - platform: template
    id: mains_power
    name: "Mains Power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      const float v = 240.0;
      const float I = id(ac_current).state;  // A
      if (isnan(I)) return NAN;
      return roundf(v * I);

  - platform: template
    id: temp_internal
    name: "Internal Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    filters:
      - throttle: 10s
      - delta: 0.1

  - platform: template
    id: temp_external
    name: "External Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    filters:
      - throttle: 10s
      - delta: 0.1

  - platform: template
    id: vehicle_batt_voltage
    name: "Vehicle Battery Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    filters:
      - throttle: 10s
      - delta: 0.1

  - platform: template
    id: leisure_batt_voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    filters:
      - throttle: 10s
      - delta: 0.1

  - platform: template
    name: "Leisure Battery Voltage"
    id: lb_voltage_avg
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    icon: mdi:car-battery
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      static float ema = NAN;
      const float raw = id(leisure_batt_voltage).state;
      if (isnan(raw)) return NAN;
      if (isnan(ema)) ema = raw;
      else ema = 0.2f * raw + 0.8f * ema;
      return ema;

  - platform: template
    id: leisure_batt_current
    name: "Leisure Battery Current"
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    filters:
      - throttle: 10s
      - delta: 0.1

  - platform: template
