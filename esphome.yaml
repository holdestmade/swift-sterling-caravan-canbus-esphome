switch:
  # Gas burner on/off. Sent via 0x0AD byte 1; byte 0 keeps the current electric level.
  # Fixed trailing bytes (1,0,1,1,0,0) match the observed static payload.
  - platform: template
    id: sw_gas
    name: "Gas Heating"
    icon: mdi:fire
    lambda: |-
      return id(g_gas_on);
    turn_on_action:
      - canbus.send:
          can_id: 0x0AD
          use_extended_id: false
          data: !lambda |-
            uint8_t level = id(g_heat_mode_idx);
            if (level > 3) level = 0;
            return std::vector<uint8_t>{level, 1, 1, 0, 1, 1, 0, 0};
      - lambda: |-
          id(g_gas_on) = true;
          id(sw_gas).publish_state(true);
    turn_off_action:
      - canbus.send:
          can_id: 0x0AD
          use_extended_id: false
          data: !lambda |-
            uint8_t level = id(g_heat_mode_idx);
            if (level > 3) level = 0;
            return std::vector<uint8_t>{level, 0, 1, 0, 1, 1, 0, 0};
      - lambda: |-
          id(g_gas_on) = false;
          id(sw_gas).publish_state(false);

select:
  # Electric heating level. Gas is now a separate switch (sw_gas).
  # Writes 0x0AD byte 0; byte 1 preserves current gas state.
  - platform: template
    id: sel_heating_mode
    name: "Heating Mode"
    icon: mdi:radiator
    options:
      - "Off"
      - "Electric 1kW"
      - "Electric 2kW"
      - "Electric 3kW"
    lambda: |-
      static const char* opts[] = {"Off","Electric 1kW","Electric 2kW","Electric 3kW"};
      uint8_t i = id(g_heat_mode_idx);
      if (i > 3) i = 0;
      return std::string(opts[i]);
    set_action:
      - canbus.send:
          can_id: 0x0AD
          use_extended_id: false
          data: !lambda |-
            uint8_t level = 0;
            if (x == "Electric 1kW") level = 1;
            else if (x == "Electric 2kW") level = 2;
            else if (x == "Electric 3kW") level = 3;
            const uint8_t gas = id(g_gas_on) ? 1 : 0;
            return std::vector<uint8_t>{level, gas, 1, 0, 1, 1, 0, 0};
      - lambda: |-
          if (x == "Electric 1kW") id(g_heat_mode_idx) = 1;
          else if (x == "Electric 2kW") id(g_heat_mode_idx) = 2;
          else if (x == "Electric 3kW") id(g_heat_mode_idx) = 3;
          else id(g_heat_mode_idx) = 0;
          id(sel_heating_mode).publish_state(x);

  # Hot water mode. Writes 0x00B byte 6; other bytes preserved from current state.
  - platform: template
    id: sel_hot_water_mode
    name: "Hot Water Mode"
    icon: mdi:water-boiler
    options:
      - "Off"
      - "Normal"
      - "Boost"
    lambda: |-
      static const char* opts[] = {"Off","Normal","Boost"};
      uint8_t i = id(g_hot_water_mode_idx);
      if (i > 2) i = 0;
      return std::string(opts[i]);
    set_action:
      - canbus.send:
          can_id: 0x00B
          use_extended_id: false
          data: !lambda |-
            uint8_t hw = 0;
            if (x == "Normal") hw = 1;
            else if (x == "Boost") hw = 2;
            // Observed from the control panel: byte 0 is 0x6E (110) only when
            // we're turning HW OFF while heating is still running. 0x6C (108)
            // is used for HW on, and for "everything off". The g_heat_control_mode_idx
            // based mapping was wrong for this specific frame type — the write side
            // doesn't cleanly map to Override/Timer the way the spec implied.
            const uint8_t cur_temp = id(g_00b_b5);
            const uint8_t mode_byte = (hw == 0 && cur_temp > 0) ? 110 : 108;
            const uint8_t d1 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
            const uint8_t d2 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
            std::vector<uint8_t> frame = {mode_byte, 150, d1, d2, 4,
              cur_temp, hw, id(g_00b_b7)};
            // DIAGNOSTIC: log what we're sending so we can compare against what
            // the physical panel sends for the same user action.
            ESP_LOGW("CAN00B_TX", "HW '%s' -> %s",
                     x.c_str(),
                     format_hex_pretty(frame.data(), frame.size()).c_str());
            return frame;
      - lambda: |-
          if (x == "Normal") id(g_hot_water_mode_idx) = 1;
          else if (x == "Boost") id(g_hot_water_mode_idx) = 2;
          else id(g_hot_water_mode_idx) = 0;
          id(sel_hot_water_mode).publish_state(x);

  # Override vs Timer — controls 0x00B byte 0 (110 = Override, 108 = Timer).
  # Synced from 0x087 byte 6.
  - platform: template
    id: sel_heating_control_mode
    name: "Heating Control Mode"
    icon: mdi:timer-cog
    options:
      - "Override"
      - "Timer"
    lambda: |-
      static const char* opts[] = {"Override","Timer"};
      uint8_t i = id(g_heat_control_mode_idx);
      if (i > 1) i = 0;
      return std::string(opts[i]);
    set_action:
      - canbus.send:
          can_id: 0x00B
          use_extended_id: false
          data: !lambda |-
            const uint8_t mode_byte = (x == "Timer") ? 108 : 110;
            const uint8_t d1 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
            const uint8_t d2 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
            return std::vector<uint8_t>{mode_byte, 150, d1, d2, 4,
              id(g_00b_b5), (uint8_t) id(g_hot_water_mode_idx), id(g_00b_b7)};
      - lambda: |-
          id(g_heat_control_mode_idx) = (x == "Timer") ? 1 : 0;
          id(sel_heating_control_mode).publish_state(x);

  # Override duration. Writes 0x00B byte 7.
  - platform: template
    id: sel_override_hours
    name: "Heating Override Hours"
    icon: mdi:timer-sand
    options:
      - "1h"
      - "2h"
      - "4h"
      - "8h"
      - "12h"
    lambda: |-
      uint8_t h = id(g_00b_b7);
      if (h <= 1) return std::string("1h");
      if (h <= 2) return std::string("2h");
      if (h <= 4) return std::string("4h");
      if (h <= 8) return std::string("8h");
      return std::string("12h");
    set_action:
      - canbus.send:
          can_id: 0x00B
          use_extended_id: false
          data: !lambda |-
            uint8_t h = 1;
            if (x == "2h") h = 2;
            else if (x == "4h") h = 4;
            else if (x == "8h") h = 8;
            else if (x == "12h") h = 12;
            const uint8_t mode_byte = (id(g_heat_control_mode_idx) == 1) ? 108 : 110;
            const uint8_t d1 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d1_level) * 100.0f)));
            const uint8_t d2 = (uint8_t) roundf(fmaxf(0.0f, fminf(100.0f, id(g_d2_level) * 100.0f)));
            return std::vector<uint8_t>{mode_byte, 150, d1, d2, 4,
              id(g_00b_b5), (uint8_t) id(g_hot_water_mode_idx), h};
      - lambda: |-
          if (x == "2h") id(g_00b_b7) = 2;
          else if (x == "4h") id(g_00b_b7) = 4;
          else if (x == "8h") id(g_00b_b7) = 8;
          else if (x == "12h") id(g_00b_b7) = 12;
          else id(g_00b_b7) = 1;
          id(sel_override_hours).publish_state(x);

climate:
  - platform: thermostat
    id: caravan_climate
    name: "Alde Heating"
    sensor: temp_internal
    min_idle_time: 1s
    min_heating_off_time: 1s
    min_heating_run_time: 1s
    idle_action:
      - logger.log: "Climate idle (caravan runs its own thermostat; ESP is a passthrough)"
    heat_action:
      - logger.log: "Climate heat (caravan runs its own thermostat; ESP is a passthrough)"
    # Mode triggers — turn heating off/on via 0x0AD.
    # Guards make the triggers idempotent so the on_boot sync call and repeat
    # mode-toggles don't re-send commands against already-matching state.
    off_mode:
      - if:
          condition:
            lambda: |-
              return id(g_heat_mode_idx) != 0 || id(g_gas_on);
          then:
            - logger.log: "Climate OFF: disabling electric + gas"
            - canbus.send:
                can_id: 0x0AD
                use_extended_id: false
                data: !lambda |-
                  return std::vector<uint8_t>{0, 0, 1, 0, 1, 1, 0, 0};
            - lambda: |-
                id(g_heat_mode_idx) = 0;
                id(g_gas_on) = false;
                id(sel_heating_mode).publish_state("Off");
                id(sw_gas).publish_state(false);
    heat_mode:
      - if:
          condition:
            lambda: |-
              // Only kick things on if nothing is currently running — otherwise
              // respect whatever the user already has selected (gas, 2kW, etc.).
              return id(g_heat_mode_idx) == 0 && !id(g_gas_on);
          then:
            - logger.log: "Climate HEAT: nothing on, defaulting to Electric 1kW"
            - canbus.send:
                can_id: 0x0AD
                use_extended_id: false
                data: !lambda |-
                  return std::vector<uint8_t>{1, 0, 1, 0, 1, 1, 0, 0};
            - lambda: |-
                id(g_heat_mode_idx) = 1;
                id(sel_heating_mode).publish_state("Electric 1kW");
    preset:
      - name: "Default"
        default_target_temperature_low: 19 °C
      - name: "Storage"
        default_target_temperature_low: 10 °C
    default_preset: "Default"
    visual:
      min_temperature: 4 °C
      max_temperature: 30 °C
      temperature_step:
        target_temperature: 1.0
        current_temperature: 0.1
